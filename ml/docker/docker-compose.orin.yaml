# For Jetson Orin only
#
# Usage:
#   docker compose -f docker-compose.orin.yaml up --build --detach  # start container
#   docker exec -it ml-ml-1 bash                                    # drop into shell for the running container
#   docker compose -f docker-compose.orin.yaml down                 # stop container

services:
  ml:
    image: laser-runner-cutter-ml:orin
    build:
      context: .
      dockerfile: Dockerfile.orin
      args:
        L4T_VERSION: r36.4.0
    # Exposes all Jetson GPU resources
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    network_mode: host
    volumes:
      # Bind mount ml dir
      - ./:/workspaces/ml
    command: sleep infinity
