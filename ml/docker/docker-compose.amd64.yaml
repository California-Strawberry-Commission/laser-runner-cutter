# For amd64 (x86_64) only. Requires nvidia-container-toolkit on the host.
#
# Usage:
#   docker compose -f docker-compose.amd64.yaml up --build --detach  # start container
#   docker exec -it ml-ml-1 bash                                     # drop into shell for the running container
#   docker compose -f docker-compose.amd64.yaml down                 # stop container

services:
  ml:
    image: laser-runner-cutter-ml:amd64
    build:
      context: .
      dockerfile: Dockerfile.amd64
      args:
        CUDA_VERSION: 13.3.0
        UBUNTU_VERSION: 24.04
    # Exposes all GPU resources
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    network_mode: host
    volumes:
      # Bind mount ml dir so editable installs and source changes are live
      - ./:/workspaces/ml
    command: sleep infinity
