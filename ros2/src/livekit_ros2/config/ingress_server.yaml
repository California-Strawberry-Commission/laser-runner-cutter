ws_url: ws://127.0.0.1:7880
redis:
  address: 127.0.0.1:6379
rtmp_port: 1935
whip_port: 8085
http_relay_port: 9095
rtc_config:
  udp_port: 7885
  tcp_port: 7886 # optional TCP ICE fallback
  use_external_ip: false
  stun_servers: []
  ips:
    # Ingress's WHIP connection is always same-host
    includes:
      - 10.0.0.0/8
      - 192.168.0.0/16
