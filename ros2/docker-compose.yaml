# For Jetson Orin only
#
# Usage:
#   docker compose up --build --detach    # start containers
#   docker exec -it ros2-ros2-1 bash      # drop into shell for the running ros2 container
#   docker/build_and_run.sh               # (inside container) build and run nodes
#   colcon build --packages-select <pkg>  # (inside container) incremental rebuild of package(s)
#   docker compose down                   # stop containers

services:
  ros2:
    image: laser-runner-cutter-ros2:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.orin
      args:
        L4T_VERSION: r36.4.0
    runtime: nvidia
    network_mode: host
    ipc: host
    privileged: true # gives access to all /dev/*. In the future could specify devices.
    stop_grace_period: 10s # gives ROS nodes time to shut down cleanly
    logging:
      driver: "local"
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      livekit-server:
        condition: service_healthy
      livekit-ingress:
        condition: service_healthy
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      # Jetson library passthroughs required for CUDA in Docker on Jetson
      - /usr/lib/aarch64-linux-gnu/tegra:/usr/lib/aarch64-linux-gnu/tegra:ro # core CUDA/OpenGL libs
      - /usr/src/jetson_multimedia_api:/usr/src/jetson_multimedia_api:ro # multimedia API headers
      - /usr/share/vpi3:/usr/share/vpi3:ro # NVIDIA VPI
      - /lib/firmware:/lib/firmware:ro # firmware for hardware accelerators (VIC, OFA, PVA, etc.)
      # Bind mount workspace
      - ./:/workspaces/ros2
      # Keep build artifacts in volume mount to keep them across restarts while avoid polluting host
      - ros2-build:/workspaces/ros2/build
      - ros2-install:/workspaces/ros2/install
      # Volume mount the home data dir
      - home-runner-cutter:/root/runner_cutter
    env_file:
      - ./.env # uses LIVEKIT_API_KEY, LIVEKIT_API_SECRET
    entrypoint: ["/workspaces/ros2/docker/dev_entrypoint.sh"]
    restart: unless-stopped

  redis:
    image: redis:8
    network_mode: host
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  livekit-server:
    image: livekit/livekit-server:v1.11
    network_mode: host
    depends_on:
      - redis
    command: ["--config", "/config/livekit_server.yaml"]
    volumes:
      - ./src/livekit_ros2/config:/config:ro
    env_file:
      - ./.env # uses LIVEKIT_KEYS
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880/ || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  livekit-ingress:
    image: livekit/ingress:v1.5
    network_mode: host
    depends_on:
      - livekit-server
      - redis
      - dns-blackhole
    command: ["--config", "/config/ingress_server.yaml"]
    volumes:
      - ./src/livekit_ros2/config:/config:ro
      # Ingress needs to use the dnsmasq DNS blackhole
      - ./src/livekit_ros2/config/ingress_resolv.conf:/etc/resolv.conf:ro
    env_file:
      - ./.env # uses LIVEKIT_API_KEY, LIVEKIT_API_SECRET
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8085' 2>/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # Ingress's WHIP-side ICE agent gathers server-reflexive candidates against these hardcoded
  # public STUN servers regardless of ingress_server.yaml's stun_servers: [] setting.
  # The issue is that if there is no working upstream DNS path (such as when WiFi is disabled)
  # we eventually hit Ingress's hardcoded timeout.
  # Since Ingress's WHIP connections are always same-host in our case, STUN/srflx candidates
  # are not needed. Thus, the solution is a dnsmasq instance so that the STUN hostnames'
  # resolution fails instantly and deterministically in every network state.
  # Config is supplied via a mounted dnsmasq.conf rather than `command:` args due to how the
  # container's entrypoint works.
  dns-blackhole:
    image: dockurr/dnsmasq
    network_mode: host
    volumes:
      - ./src/livekit_ros2/config/dnsmasq.conf:/etc/dnsmasq.conf:ro
    restart: unless-stopped

volumes:
  ros2-build:
  ros2-install:
  home-runner-cutter:
